name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  check-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vite-plus@v1

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Build
        run: vp run build

      - name: Check
        run: vp check

      - name: Test
        run: vp test
